<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter | 404</title>
    <link rel="stylesheet" href="/gui/styles.css">
    <link rel="stylesheet" href="/gui/lib/iconfont/material-icons.css">
    <link rel="icon" type="image/svg+xml" href="/gui/favicon.svg">
    <script src="/gui/lib/tailwind.js"></script>
</head>

<body class="bg-indigo-500 h-screen max-h-screen">
    <div class="bg-neutral-950/95 w-full h-screen flex flex-col">
        <div class="p-3">
            <div class="bg-indigo-300/5 w-full h-12 rounded-full p-2 flex items-center ">
                <div class="pl-3 text-white/70 font-google">interpreter</div>
                <div class="w-full flex justify-end gap-2">
                    <a href="/" class="h-8 px-4 rounded-full bg-indigo-500 hover:bg-indigo-600 text-black/80 text-sm font-google flex items-center">
                        Home
                    </a>
                    <a href="/api" class="h-8 px-4 rounded-full bg-indigo-500 hover:bg-indigo-600 text-black/80 text-sm font-google flex items-center">
                        API
                    </a>
                </div>
            </div>
        </div>  


        <div class="h-full p-3 pt-0 pb-3">
            <div class="h-full bg-black/90 rounded-3xl flex flex-col">
                <div class="flex h-12 pl-4 pr-4 w-full font-google items-center text-white/40">
                    <div class="pl-2 font-monospace">error</div>
                    <div class="w-full flex justify-end cursor-default select-none">
                        <span class="material-icons-round">error_outline</span>
                    </div>
                </div>

                <div class="px-6 pb-6 h-full flex items-center justify-between gap-6">
                    <div>
                        <div class="text-indigo-400 text-6xl font-monospace leading-none">404</div>
                        <div class="text-white/85 font-google text-xl mt-2">Page not found</div>
                        <p class="text-white/60 font-monospace mt-2 max-w-xl">
                            The route you requested does not exist. Use the navigation buttons to continue.
                        </p>
                    </div>
                    <div class="flex flex-col gap-2 min-w-[180px]">
                        <a href="/" class="rounded-full h-10 px-4 bg-indigo-500 hover:bg-indigo-600 text-black/90 font-google flex items-center justify-center">
                            Go to editor
                        </a>
                        <a href="/api" class="rounded-full h-10 px-4 bg-white/10 hover:bg-white/20 text-white/90 font-google flex items-center justify-center">
                            API docs
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
