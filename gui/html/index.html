<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interpreter</title>
    <link rel="stylesheet" href="/gui/lib/codemirror/codemirror.min.css">
    <link rel="stylesheet" href="/gui/lib/codemirror/dracula.min.css">
    <link rel="stylesheet" href="/gui/styles.css">
    <link rel="stylesheet" href="/gui/lib/iconfont/material-icons.css">
    <link rel="icon" type="image/svg+xml" href="/gui/favicon.svg">
    <script src="/gui/lib/codemirror/codemirror.min.js"></script>
    <script src="/gui/lib/codemirror/go.min.js"></script>
    <script src="/gui/lib/tailwind.js"></script>
</head>

<body class="bg-indigo-500 h-screen max-h-screen">
    <div class="bg-neutral-950/95 w-full h-screen flex flex-col">
        <div class="p-3">
            <div class="bg-indigo-300/5 w-full h-12 rounded-full p-2 flex">
                
                <div class="w-full overflow-x-scroll h-8">
                    <div class="flex" id="saves"></div>
                </div>

                <div class="flex justify-end">
                    <div class="flex rounded-full pl-2">
                        <div class="w-8 h-8 rounded-full cursor-pointer hover:bg-indigo-600 bg-indigo-500 flex items-center justify-center"
                            onclick="delcurr()">
                            <span class="material-icons text-black/80">delete</span>
                        </div>
                        <div class="pl-2">
                            <div class="w-8 h-8 rounded-full cursor-pointer hover:bg-indigo-600 bg-indigo-500 flex items-center justify-center"
                                onclick="NewCode()">
                                <span class="material-icons text-black/80 ">add</span>
                            </div>
                        </div>
                        <div class="pl-2">
                            <div class="w-8 h-8 rounded-full cursor-pointer hover:bg-indigo-600 bg-indigo-500 flex items-center justify-center"
                            onclick='submitCode("run")'>
                                <span class="material-icons text-black/80 ">chevron_right</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="h-full flex flex-col">
            <div class="p-3 pt-0 h-full">

                <div class="h-full bg-black/90 rounded-3xl flex flex-col">
                    <div class="flex h-12 pl-4 pr-4 w-full font-google items-center text-white/40">
                
                        <div class="pl-2 font-monospace">code</div>
                
                        <div class="w-full flex justify-end cursor-default select-none">
                            <span class="material-icons-round">code</span>
                        </div>
                    </div>
        
                    <div class="p-6 pt-0 h-full">
                        <div class="text-white/80  font-monospace h-full pb-6 w-full relative">
                            <div class="absolute  rounded-lg w-full h-full overflow-y-scroll">
                                <div class="coder">
                                    <textarea id="writer" name="code" class="code"></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                
                </div>
        
            </div>

            <div class="p-3 pt-0">
                <div class="h-40 bg-black/90 rounded-3xl">
                    <div class="terminal">
                        <div class="flex h-12 pl-4 pr-4 w-full font-google items-center text-white/40">
                            <div class="pl-2 font-monospace">terminal</div>
                            <div class="w-full flex justify-end cursor-default select-none">
                                <span class="material-icons-round">terminal</span>
                            </div>
                        </div>
                        <div class="console output pl-6 pr-6 pb-6 text-white font-monospace"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<script src="/gui/main.js"></script>
